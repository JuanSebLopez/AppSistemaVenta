<div class="modal-shell">
    <div class="modal-head">
        <p class="modal-kicker">Modulo de usuarios</p>
        <h2 mat-dialog-title>{{tituloAccion}} usuario</h2>
        <p class="modal-copy">Actualiza credenciales, rol y estado dentro del sistema administrativo.</p>
    </div>

    <mat-dialog-content class="modal-content">
        <form [formGroup]="formularioUsuario" class="modal-form">
            <mat-form-field appearance="outline">
                <mat-label>Nombre completo</mat-label>
                <input matInput autocomplete="off" formControlName="nombreCompleto">
                <mat-icon matSuffix>account_box</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Correo</mat-label>
                <input matInput autocomplete="off" formControlName="correo">
                <mat-icon matSuffix>mail</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Rol</mat-label>
                <mat-select matInput formControlName="idRol">
                    <mat-option *ngFor="let item of listaRoles" [value]="item.idRol">
                        {{item.nombre}}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Contrasena</mat-label>
                <input matInput [type]="ocultarPassword ? 'password' : 'text'" formControlName="clave">
                <button mat-icon-button matSuffix (click)="ocultarPassword = !ocultarPassword" type="button">
                    <mat-icon>{{ocultarPassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                </button>
            </mat-form-field>

            <mat-form-field appearance="outline" *ngIf="datosUsuario?.idUsuario !== idUsuarioAutenticado">
                <mat-label>Estado</mat-label>
                <mat-select formControlName="esActivo">
                    <mat-option value="1">Activo</mat-option>
                    <mat-option value="0">No activo</mat-option>
                </mat-select>
            </mat-form-field>
        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end" class="modal-actions">
        <button class="ghost-button" mat-raised-button mat-dialog-close="warn">Volver</button>
        <button class="action-button" mat-raised-button [disabled]="formularioUsuario.invalid" (click)="guardarEditar_Usuario()">
            {{botonAccion}}
        </button>
    </mat-dialog-actions>
</div>
