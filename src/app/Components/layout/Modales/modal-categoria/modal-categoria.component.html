<div class="modal-shell">
  <div class="modal-head">
    <p class="modal-kicker">Modulo de categorias</p>
    <h2 mat-dialog-title>{{tituloAccion}} categoria</h2>
    <p class="modal-copy">Define el nombre visible y la disponibilidad de la categoria.</p>
  </div>

  <mat-dialog-content class="modal-content">
    <form [formGroup]="formularioCategoria" class="modal-form">
      <mat-form-field appearance="outline">
        <mat-label>Nombre de la categoria</mat-label>
        <input matInput autocomplete="off" formControlName="nombre">
        <mat-icon matSuffix>category</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Estado</mat-label>
        <mat-select formControlName="esActivo">
          <mat-option value="1">Activo</mat-option>
          <mat-option value="0">Inactivo</mat-option>
        </mat-select>
      </mat-form-field>
    </form>
  </mat-dialog-content>

  <mat-dialog-actions align="end" class="modal-actions">
    <button class="ghost-button" mat-raised-button mat-dialog-close>Volver</button>
    <button class="action-button" mat-raised-button [disabled]="formularioCategoria.invalid" (click)="guardarEditar_Categoria()">
      {{botonAccion}}
    </button>
  </mat-dialog-actions>
</div>
