<div class="modal-shell">
    <div class="modal-head">
        <p class="modal-kicker">Consulta de venta</p>
        <h2 mat-dialog-title>Detalle de venta</h2>
        <p class="modal-copy">Resumen de la transaccion y lista de productos asociados.</p>
    </div>

    <mat-dialog-content class="modal-content">
        <div class="info-grid">
            <mat-form-field appearance="outline">
                <mat-label>Fecha registro</mat-label>
                <input matInput [(ngModel)]="fechaRegistro">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Numero venta</mat-label>
                <input matInput [(ngModel)]="numeroDocumento">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Tipo de pago</mat-label>
                <input matInput [(ngModel)]="tipoPago">
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Total</mat-label>
                <input matInput [(ngModel)]="total">
            </mat-form-field>
        </div>
  
        <div class="detail-block">
            <p class="detail-label">Lista de productos</p>

            <div class="table-shell">
                <table mat-table [dataSource]="detalleVenta">
                    <ng-container matColumnDef="producto">
                        <th mat-header-cell *matHeaderCellDef> Producto </th>
                        <td mat-cell *matCellDef="let element"> {{element.productoDescripcion}} </td>
                    </ng-container>

                    <ng-container matColumnDef="cantidad">
                        <th mat-header-cell *matHeaderCellDef> Cantidad</th>
                        <td mat-cell *matCellDef="let element"> {{element.cantidad}} </td>
                    </ng-container>

                    <ng-container matColumnDef="precio">
                        <th mat-header-cell *matHeaderCellDef> Precio</th>
                        <td mat-cell *matCellDef="let element"> {{element.precioTexto}} </td>
                    </ng-container>

                    <ng-container matColumnDef="total">
                        <th mat-header-cell *matHeaderCellDef> Total</th>
                        <td mat-cell *matCellDef="let element"> {{element.totalTexto}} </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="columnasTabla"></tr>
                    <tr mat-row *matRowDef="let row; columns : columnasTabla;"></tr>
                </table>
            </div>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end" class="modal-actions">
        <button class="ghost-button" mat-raised-button mat-dialog-close cdkFocusInitial>Volver</button>
    </mat-dialog-actions>
</div>
