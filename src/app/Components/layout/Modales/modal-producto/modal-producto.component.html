<div class="modal-shell">
    <div class="modal-head">
        <p class="modal-kicker">Modulo de catalogo</p>
        <h2 mat-dialog-title>{{tituloAccion}} producto</h2>
        <p class="modal-copy">Administra nombre, categoria, stock, precio y disponibilidad.</p>
    </div>

    <mat-dialog-content class="modal-content">
        <form [formGroup]="formularioProducto" class="modal-form">
            <mat-form-field appearance="outline">
                <mat-label>Nombre</mat-label>
                <input matInput autocomplete="off" formControlName="nombre">
                <mat-icon matSuffix>inventory_2</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline">
                <mat-label>Categoria</mat-label>
                <mat-select formControlName="idCategoria"> 
                    <mat-option *ngFor="let item of listaCategorias" [value]="item.idCategoria">
                        {{item.nombre}}
                    </mat-option>
                </mat-select>
            </mat-form-field>

            <div class="split-fields">
                <mat-form-field appearance="outline">
                    <mat-label>Stock</mat-label>
                    <input matInput autocomplete="off" formControlName="stock" type="number">
                    <mat-icon matSuffix>pin</mat-icon>
                </mat-form-field>

                <mat-form-field appearance="outline">
                    <mat-label>Precio</mat-label>
                    <input matInput autocomplete="off" formControlName="precio" type="text">
                    <mat-icon matSuffix>payments</mat-icon>
                </mat-form-field>
            </div>

            <mat-form-field appearance="outline">
                <mat-label>Estado</mat-label>
                <mat-select formControlName="esActivo"> 
                    <mat-option value="1">Activo</mat-option>
                    <mat-option value="0">No activo</mat-option>
                </mat-select>
            </mat-form-field>
        </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end" class="modal-actions">
        <button class="ghost-button" mat-raised-button mat-dialog-close>Volver</button>
        <button class="action-button" mat-raised-button
            [disabled]="formularioProducto.invalid"
            (click)="guardarEditar_Producto()">{{botonAccion}}</button>
    </mat-dialog-actions>
</div>
