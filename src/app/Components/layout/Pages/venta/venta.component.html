<section class="page-shell">
    <header class="page-header">
        <div>
            <p class="page-kicker">Operacion</p>
            <h1>Nueva venta</h1>
        </div>
        <div class="total-chip">
            <span>Total actual</span>
            <strong>S/. {{totalPagar.toFixed(2)}}</strong>
        </div>
    </header>

    <mat-card class="panel-card">
        <mat-card-content class="panel-body">
            <form [formGroup]="formularioProductoVenta" (ngSubmit)="agregarProductoParaVenta()" class="sales-grid">
                <mat-form-field class="full-width sales-product" appearance="outline">
                    <mat-label>Producto</mat-label>
                    <input matInput type="text" placeholder="Buscar..." [matAutocomplete]="auto" formControlName="producto">
                    <mat-autocomplete autoActiveFirstOption #auto="matAutocomplete"
                        (optionSelected)="productoParaVenta($event)"
                        [displayWith]="mostrarProducto">
                        <mat-option *ngFor="let option of listaProductosFiltro" [value]="option">
                            {{option.nombre}}
                        </mat-option>
                    </mat-autocomplete>
                </mat-form-field>

                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>Cantidad</mat-label>
                    <input matInput type="number" formControlName="cantidad">
                </mat-form-field>

                <button class="action-button" mat-raised-button [disabled]="formularioProductoVenta.invalid">
                    <mat-icon>add</mat-icon> Agregar
                </button>
            </form>

            <div class="sales-grid second-row">
                <div></div>
                <mat-form-field class="full-width" appearance="outline">
                    <mat-label>Tipo de pago</mat-label>
                    <mat-select [(value)]="tipodePagoPorDefecto"> 
                        <mat-option value="Efectivo">Efectivo</mat-option>
                        <mat-option value="Tarjeta">Tarjeta</mat-option>
                    </mat-select>
                </mat-form-field>

                <button class="ghost-button total-button" mat-raised-button>
                    Total: S/. {{totalPagar.toFixed(2)}}
                </button>
            </div>

            <div class="table-shell">
                <table mat-table [dataSource]="datosDetalleVenta">

                    <ng-container matColumnDef="producto">
                        <th mat-header-cell *matHeaderCellDef> Producto </th>
                        <td mat-cell *matCellDef="let element"> {{element.descripcionProducto}} </td>
                    </ng-container>

                    <ng-container matColumnDef="cantidad">
                        <th mat-header-cell *matHeaderCellDef> Cantidad</th>
                        <td mat-cell *matCellDef="let element"> {{element.cantidad}} </td>
                    </ng-container>

                    <ng-container matColumnDef="precio">
                        <th mat-header-cell *matHeaderCellDef> Precio</th>
                        <td mat-cell *matCellDef="let element"> {{element.precioTexto}} </td>
                    </ng-container>

                    <ng-container matColumnDef="total">
                        <th mat-header-cell *matHeaderCellDef> Total</th>
                        <td mat-cell *matCellDef="let element"> {{element.totalTexto}} </td>
                    </ng-container>

                    <ng-container matColumnDef="accion">
                        <th mat-header-cell *matHeaderCellDef style="width: 80px;"></th>
                        <td mat-cell *matCellDef="let element">
                            <button mat-icon-button color="warn" (click)="eliminarProducto(element)">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </td>
                    </ng-container>

                    <tr mat-header-row *matHeaderRowDef="columnasTabla"></tr>
                    <tr mat-row *matRowDef="let row; columns : columnasTabla;"></tr>

                </table>

            </div>

            <div class="footer-actions">
                <button class="action-button register-button" mat-raised-button
                [disabled]="listaProductosParaVenta.length < 1 || bloquearBotonRegistrar"
                (click)="registrarVenta()">
                    <mat-icon>new_label</mat-icon> Registrar
                </button>
            </div>
        </mat-card-content>
    </mat-card>
</section>
