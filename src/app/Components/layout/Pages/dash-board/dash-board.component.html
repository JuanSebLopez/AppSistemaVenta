<section class="page-shell">
    <header class="page-header">
        <div>
            <p class="page-kicker">Dashboard</p>
            <h1>Resumen operativo de la ultima semana</h1>
        </div>
        <div class="page-note">
            <span>Estado</span>
            <strong>Lectura consolidada</strong>
        </div>
    </header>

    <section class="stats-grid">
        <mat-card class="metric-card">
            <mat-card-content>
                <div class="metric-icon"><mat-icon>payments</mat-icon></div>
                <span class="metric-label">Total ingresos</span>
                <strong>S/. {{totalIngresos}}</strong>
            </mat-card-content>
        </mat-card>

        <mat-card class="metric-card">
            <mat-card-content>
                <div class="metric-icon"><mat-icon>sell</mat-icon></div>
                <span class="metric-label">Total ventas</span>
                <strong>{{totalVentas}}</strong>
            </mat-card-content>
        </mat-card>

        <mat-card class="metric-card">
            <mat-card-content>
                <div class="metric-icon"><mat-icon>inventory_2</mat-icon></div>
                <span class="metric-label">Total productos</span>
                <strong>{{totalProductos}}</strong>
            </mat-card-content>
        </mat-card>
    </section>

    <mat-card class="panel-card">
        <mat-card-content>
            <div class="panel-heading">
                <div>
                    <p class="page-kicker">Tendencia</p>
                    <h2>Ventas por periodo reciente</h2>
                </div>
            </div>

            <div class="chart-shell">
                <canvas id="chartBarras"></canvas>
            </div>
        </mat-card-content>
    </mat-card>
</section>
