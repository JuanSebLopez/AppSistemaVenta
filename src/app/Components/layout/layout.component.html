<div class="layout-shell">
    <mat-toolbar class="app-toolbar">
        <mat-toolbar-row class="toolbar-row">
            <div class="toolbar-brand">
                <button mat-icon-button class="toolbar-icon" (click)="sidenav.toggle()">
                    <mat-icon>menu</mat-icon>
                </button>

                <div class="brand-mark">SV</div>

                <div class="brand-copy">
                    <strong>Sistema Venta</strong>
                    <span>Entorno administrativo de practica</span>
                </div>
            </div>

            <div class="toolbar-meta">
                <div class="meta-chip">
                    <span>Usuario</span>
                    <strong>{{correoUsuario}}</strong>
                </div>
                <div class="meta-chip">
                    <span>Rol</span>
                    <strong>{{rolUsuario}}</strong>
                </div>
                <button mat-icon-button class="toolbar-icon logout-button" (click)="cerrarSesion()">
                    <mat-icon>logout</mat-icon>
                </button>
            </div>
        </mat-toolbar-row>
    </mat-toolbar>

    <mat-sidenav-container class="layout-container">
        <mat-sidenav #sidenav opened="true" mode="side" class="app-sidenav">
            <div class="sidenav-head">
                <span class="sidenav-label">Modulos del sistema</span>
                <p>Navegacion operativa para pruebas, gestion y consulta.</p>
            </div>

            <mat-nav-list class="menu-list">
                <mat-list-item *ngFor="let menu of listaMenus" [routerLink]="menu.url" routerLinkActive="active-link">
                    <mat-icon matListItemIcon>{{menu.icono}}</mat-icon>
                    <div matListItemTitle>{{menu.nombre}}</div>
                </mat-list-item>
            </mat-nav-list>
        </mat-sidenav>

        <mat-sidenav-content class="layout-content">
            <div class="content-shell">
                <router-outlet></router-outlet>
            </div>
        </mat-sidenav-content>
    </mat-sidenav-container>
</div>
